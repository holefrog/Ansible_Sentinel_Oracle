- name: Reload Nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded

- name: Save iptables rules
  ansible.builtin.shell: >
    netfilter-persistent save || {
    iptables-save > /etc/iptables/rules.v4 &&
    ip6tables-save > /etc/iptables/rules.v6; }
  become: true
  ignore_errors: true